<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signature Visual starter harness</title>
    <script type="importmap">
      {
        "imports": {
          "three": "/site/assets/vendor/three.module.js"
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #0a0e27; }
      main { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
      .tile { position: relative; min-height: 360px; overflow: hidden; border: 1px solid rgba(255,255,255,.12); }
      .tile:last-child { background: #dbe1e9; }
      #fallbacks { position: fixed; left: -12000px; top: 0; display: grid; grid-template-columns: repeat(4, 160px); }
      #fallbacks > div { position: relative; width: 160px; height: 90px; }
      @media (max-width: 700px) { main { grid-template-columns: 1fr; } .tile { min-height: 320px; } }
    </style>
  </head>
  <body>
    <main>
      <div class="tile" id="canvas"></div>
      <div class="tile" id="three"></div>
      <div class="tile" id="webgl"></div>
      <div class="tile" id="svg"></div>
    </main>
    <aside id="fallbacks" aria-hidden="true">
      <div id="fallback-canvas"></div>
      <div id="fallback-three"></div>
      <div id="fallback-webgl"></div>
      <div id="fallback-svg"></div>
    </aside>
    <script type="module">
      import { createCanvasField } from '/skills/signature-visual/references/starters/canvas-field.js';
      import { createLivingForm } from '/skills/signature-visual/references/starters/three-living-form.js';
      import { createShaderField } from '/skills/signature-visual/references/starters/webgl-shader-field.js';
      import { createTechnicalSystem } from '/skills/signature-visual/references/starters/svg-technical-system.js';

      const observations = {
        canvas: { seed: null, pointer: null },
        three: { seed: null, pointer: null },
        webgl: { seed: null, pointer: null },
        svg: { seed: null, pointer: null }
      };

      let disposers = [];
      let fallbackDisposers = [];
      let mountCount = 0;
      const pointerPoint = pointer => pointer ? {
        x: pointer.x,
        y: pointer.y,
        active: Boolean(pointer.active),
        strength: Number(pointer.strength ?? pointer.active ?? 0)
      } : null;

      function mountStarters() {
        disposers = [
          createCanvasField(document.querySelector('#canvas'), {
            createProgram: () => ({
              reset: state => { observations.canvas.seed = state.seed; },
              step: state => { observations.canvas.pointer = pointerPoint(state.pointer); }
            })
          }),
          createLivingForm(document.querySelector('#three'), {
            createProgram: () => ({
              setSeed: seed => { observations.three.seed = seed; },
              setPointer: pointer => { observations.three.pointer = pointerPoint(pointer); }
            })
          }),
          createShaderField(document.querySelector('#webgl'), {
            beforeRender: state => {
              observations.webgl.seed = state.seed;
              observations.webgl.pointer = pointerPoint(state.pointer);
            }
          }),
          createTechnicalSystem(document.querySelector('#svg'), {
            decorative: false,
            createProgram: () => ({
              setSeed: seed => { observations.svg.seed = seed; },
              setPointer: pointer => { observations.svg.pointer = pointerPoint(pointer); }
            })
          })
        ];
        fallbackDisposers = [
          createCanvasField(document.querySelector('#fallback-canvas'), {
            fallback: '#18213f',
            createProgram: () => { throw new Error('forced canvas fallback'); }
          }),
          createLivingForm(document.querySelector('#fallback-three'), {
            fallback: '#18213f',
            createProgram: () => { throw new Error('forced three fallback'); }
          }),
          createShaderField(document.querySelector('#fallback-webgl'), {
            fallback: '#18213f',
            fragmentSource: 'precision mediump float; void main() { invalidShaderToken; }'
          }),
          createTechnicalSystem(document.querySelector('#fallback-svg'), {
            fallback: 'Authored SVG fallback',
            createProgram: () => { throw new Error('forced SVG fallback'); }
          })
        ];
        mountCount += 1;
        window.__starters = disposers;
        window.__fallbackStarters = fallbackDisposers;
        return disposers;
      }

      window.__starterObservations = observations;
      window.__mountStarters = mountStarters;
      window.__starterMountCount = () => mountCount;
      window.__disposeAll = () => {
        disposers.forEach(dispose => dispose());
        fallbackDisposers.forEach(dispose => dispose());
        disposers = [];
        fallbackDisposers = [];
        window.__starters = disposers;
        window.__fallbackStarters = fallbackDisposers;
      };
      mountStarters();
      window.__starterReady = true;
    </script>
  </body>
</html>
